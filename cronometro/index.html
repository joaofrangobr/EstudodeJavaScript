<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="titulo">Timer</h1>
    <div class="container"> <!-- Container para o cronômetro -->
        <h1 id="watch">00:00:00</h1>
        <button class="init-btn" onclick="init()">Inicio</button>
        <button class="pause-btn" onclick="pause()">Pausar</button>
        <button class="stop-btn" onclick="clearAll()">Zerar</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
